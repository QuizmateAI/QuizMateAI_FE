<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/logo-light.webp" id="favicon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizMate AI - Chinh phục kiến thức cùng AI</title>
    <meta name="description" content="QuizMate AI - Nền tảng học tập thông minh sử dụng AI để tạo quiz, flashcard và roadmap học tập cá nhân hóa." />
    <meta name="theme-color" content="#2563EB" />

    <!-- Polyfill global for SockJS compatibility -->
    <script>
      window.global = window;
    </script>

    <!-- Favicon theo theme browser -->
    <script>
      (function() {
        var favicon = document.getElementById('favicon');
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function update() { favicon.href = mq.matches ? '/logo-dark.webp' : '/logo-light.webp'; }
        update();
        mq.addEventListener('change', update);
      })();
    </script>

    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load with display=swap -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Merriweather:wght@400;700&family=Nunito:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&family=Roboto+Slab:wght@400;600;700&family=Tangerine:wght@400;700&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Merriweather:wght@400;700&family=Nunito:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&family=Roboto+Slab:wght@400;600;700&family=Tangerine:wght@400;700&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
